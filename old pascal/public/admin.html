<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin PATHFINDER</title>
<style>
body{font-family:sans-serif;margin:10px; background:#f9fafb; color:#111;}
button{padding:6px 12px;margin:2px; cursor:pointer;}
input[type="text"],input[type="password"],input[type="file"]{padding:6px;margin:2px;width:200px;}
#roomsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:10px;}
.room-card{background:#fff;padding:10px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.room-card img{width:100%;height:100px;object-fit:cover;border-radius:4px;margin:5px 0;}
#dropZone{border:2px dashed #999;padding:20px;text-align:center;margin:10px 0;border-radius:8px;background:#fff;}
table{border-collapse:collapse;width:100%;background:#fff;border-radius:8px;overflow:hidden;margin-top:10px;}
th,td{border:1px solid #ddd;padding:8px;text-align:left;}
th{background:#f3f4f6;cursor:pointer;}
#imageList img{width:50px;height:50px;object-fit:contain;margin:3px;border-radius:4px;}
</style>
</head>
<body>

<h1>PATHFINDER Admin Panel</h1>

<!-- LOGIN -->
<div id="loginForm">
  <input type="password" id="adminPass" placeholder="Admin password">
  <button onclick="simpleLogin()">Login</button>
</div>

<!-- ADMIN CONTENT -->
<div id="adminContent" style="display:none;">

<button onclick="logout()">Logout</button>

<h2>Search / Filter Rooms</h2>
<input type="text" id="searchInput" placeholder="Search by USID, Building, Level">

<h2>Rooms</h2>
<div id="dropZone">Drag & Drop JSON here to import rooms</div>
<input type="file" id="fileInput"><button onclick="importFile()">Upload JSON</button>
<div id="roomsGrid"></div>

<h2>Upload Image</h2>
<input type="file" id="imgFile"><button onclick="uploadImage()">Upload Image</button>
<div id="imageList"></div>

<h2>Feedback</h2>
<button onclick="exportFeedback()">Export Feedback CSV</button>
<table id="feedbackTable">
  <thead>
    <tr><th>USID</th><th>Rating</th><th>Comment</th><th>Timestamp</th></tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Report</h2>
<button onclick="exportReport()">Export Report CSV</button>

</div>

<script src="admin.js"></script>
<script>
function simpleLogin(){
  const pass = document.getElementById("adminPass").value;
  if(pass==="1234"){
    document.getElementById("loginForm").style.display="none";
    document.getElementById("adminContent").style.display="block";
    initAdmin(); // Räume laden etc.
  } else {
    alert("Wrong password");
  }
}
function logout(){
  document.getElementById("loginForm").style.display="block";
  document.getElementById("adminContent").style.display="none";
}
</script>
</body>
</html>
