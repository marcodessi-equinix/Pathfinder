name: pathfinder

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PATHFINDER_DATA_DIR: /app/data
      PATHFINDER_UPLOADS_DIR: /app/uploads
      PATHFINDER_BUILDING_TEMPLATES_DIR: /app/building-templates
      PATHFINDER_DEFAULT_BUILDING_TEMPLATES_DIR: /app/default-building-templates
    volumes:
      - pathfinder_data:/app/data
      - pathfinder_uploads:/app/uploads
      - pathfinder_building_templates:/app/building-templates
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: ./infra/nginx/Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${APP_PORT:-9110}:80"
    restart: unless-stopped

volumes:
  pathfinder_data:
  pathfinder_uploads:
  pathfinder_building_templates:
