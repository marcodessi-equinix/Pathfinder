name: pathfinder

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me}
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      PATHFINDER_DATA_DIR: /app/data
      PATHFINDER_UPLOADS_DIR: /app/uploads
      PATHFINDER_BUILDING_TEMPLATES_DIR: /app/building-templates
      PATHFINDER_DEFAULT_BUILDING_TEMPLATES_DIR: /app/default-building-templates
      NODE_OPTIONS: --experimental-sqlite
    volumes:
      - pathfinder_data:/app/data
      - pathfinder_uploads:/app/uploads
      - pathfinder_building_templates:/app/building-templates
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: ./infra/nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "${APP_PORT:-9110}:80"
    restart: unless-stopped

volumes:
  pathfinder_data:
  pathfinder_uploads:
  pathfinder_building_templates:
